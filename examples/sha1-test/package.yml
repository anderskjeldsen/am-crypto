id: sha1-test
version: 1.0.0
type: application
dependencies:
  - id: am-lang-core
    realm: github
    type: git-repo
    tag: latest
    branch: master
    url: https://github.com/anderskjeldsen/am-lang-core.git
  - id: am-net
    realm: github
    type: git-repo
    tag: latest
    branch: master
    url: https://github.com/anderskjeldsen/am-net.git
  - id: am-crypto
    type: local
    path: ../../
platforms:
  - id: libc
    abstract: true
  - id: linux-x64
    extends: libc
    gccCommand: gcc -O3
    gccAdditionalLibraries:
      - crypto
  - id: macos
    extends: libc
    gccCommand: gcc -O3
    additionalIncludePaths:
      - /opt/homebrew/opt/openssl/include
    gccLibraryPaths:
      - /opt/homebrew/opt/openssl/lib
    gccAdditionalLibraries:
      - crypto
  - id: macos-arm
    extends: libc
    gccCommand: gcc -O3
    additionalIncludePaths:
      - /opt/homebrew/opt/openssl/include
    gccLibraryPaths:
      - /opt/homebrew/opt/openssl/lib
    gccAdditionalLibraries:
      - crypto
  - id: amigaos
    extends: libc
    gccCommand: m68k-amigaos-gcc -O3
    gccAdditionalOptions:
      - -noixemul
    additionalLinkerFlags:
      - -noixemul
    gccAdditionalLibraries:
  - id: morphos-ppc
    extends: libc
    gccCommand: ppc-morphos-gcc -O3
    gccAdditionalOptions:
      - -noixemul
    additionalLinkerFlags:
      - -noixemul
    gccAdditionalLibraries:
      - crypto
buildTargets:
  - id: linux-x64
    platform: linux-x64
  - id: macos
    platform: macos
  - id: macos-arm
    platform: macos-arm
  - id: amigaos_docker
    platform: amigaos
    dockerBuild:
      image: amiga-gcc
      buildPath: /host
  - id: morphos-ppc_docker
    platform: morphos-ppc
    dockerBuild:
      image: amigadev/crosstools:ppc-morphos
      buildPath: /work
